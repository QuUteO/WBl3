version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: DelayedNotifier
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: user
      POSTGRES_DB: DelayedNotifier
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data: