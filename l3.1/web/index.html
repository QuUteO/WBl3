<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Delayed Notifier</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #d9dee7;
      --accent: #0f766e;
      --accent-strong: #115e59;
      --danger: #b42318;
      --warn: #b54708;
      --ok: #067647;
      --info: #175cd3;
      --shadow: 0 8px 28px rgba(31, 41, 55, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font: 15px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .page {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 44px;
    }

    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 24px;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 44px);
      line-height: 1.05;
      font-weight: 760;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      max-width: 720px;
    }

    .status-line {
      min-width: 250px;
      color: var(--muted);
      text-align: right;
      font-size: 14px;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(300px, 390px) 1fr;
      gap: 20px;
      align-items: start;
    }

    section,
    .toolbar {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    section {
      padding: 20px;
    }

    h2 {
      margin: 0 0 16px;
      font-size: 18px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    form {
      display: grid;
      gap: 14px;
    }

    label {
      display: grid;
      gap: 6px;
      color: #344054;
      font-size: 13px;
      font-weight: 650;
    }

    input,
    select,
    textarea {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      padding: 10px 12px;
      font: inherit;
      outline: none;
    }

    textarea {
      min-height: 108px;
      resize: vertical;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.14);
    }

    .quick-time {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    button {
      min-height: 40px;
      border: 1px solid transparent;
      border-radius: 6px;
      padding: 9px 13px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: background 120ms ease, border-color 120ms ease, color 120ms ease;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .primary {
      background: var(--accent);
      color: #fff;
    }

    .primary:hover:not(:disabled) {
      background: var(--accent-strong);
    }

    .secondary {
      background: #fff;
      border-color: var(--line);
      color: #344054;
    }

    .secondary:hover:not(:disabled) {
      border-color: #98a2b3;
    }

    .danger {
      background: #fff;
      border-color: #fecdca;
      color: var(--danger);
    }

    .danger:hover:not(:disabled) {
      background: #fff4f3;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 10px;
      padding: 14px;
      margin-bottom: 14px;
      box-shadow: none;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    table {
      width: 100%;
      min-width: 760px;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #f9fafb;
      color: #475467;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      word-break: break-all;
    }

    .message {
      max-width: 260px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      border-radius: 999px;
      padding: 2px 9px;
      font-size: 12px;
      font-weight: 760;
      background: #eef2f6;
      color: #344054;
    }

    .badge.scheduled,
    .badge.processing,
    .badge.retry {
      background: #fff4e5;
      color: var(--warn);
    }

    .badge.sent {
      background: #ecfdf3;
      color: var(--ok);
    }

    .badge.failed,
    .badge.cancelled {
      background: #fff1f3;
      color: var(--danger);
    }

    .empty {
      padding: 28px;
      color: var(--muted);
      text-align: center;
    }

    .notice {
      min-height: 22px;
      color: var(--muted);
      font-size: 14px;
    }

    .notice.error {
      color: var(--danger);
    }

    .notice.ok {
      color: var(--ok);
    }

    @media (max-width: 860px) {
      header,
      .layout {
        display: grid;
        grid-template-columns: 1fr;
      }

      .status-line {
        min-width: 0;
        text-align: left;
      }

      .toolbar {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header>
      <div>
        <h1>Delayed Notifier</h1>
        <p class="subtitle">Создание уведомлений, отмена и просмотр статусов через текущий API сервиса.</p>
      </div>
      <div class="status-line" id="statusLine">Статусы обновляются вручную или каждые 15 секунд.</div>
    </header>

    <div class="layout">
      <section>
        <h2>Новое уведомление</h2>
        <form id="notifyForm">
          <label>
            Канал
            <select name="channel" id="channel">
              <option value="email">Email</option>
              <option value="telegram">Telegram</option>
            </select>
          </label>

          <label>
            Получатель
            <input name="recipient" id="recipient" type="text" required placeholder="email или chat_id">
          </label>

          <label>
            Дата и время отправки
            <input name="scheduled_at" id="scheduledAt" type="datetime-local" required>
          </label>

          <div class="quick-time" aria-label="Быстрый выбор времени">
            <button class="secondary" type="button" data-delay="1">+1 мин</button>
            <button class="secondary" type="button" data-delay="10">+10 мин</button>
            <button class="secondary" type="button" data-delay="60">+1 час</button>
          </div>

          <label>
            Сообщение
            <textarea name="message" id="message" required placeholder="Текст уведомления"></textarea>
          </label>

          <button class="primary" type="submit" id="submitBtn">Создать</button>
          <div class="notice" id="formNotice"></div>
        </form>
      </section>

      <section>
        <h2>Уведомления</h2>
        <div class="toolbar">
          <input id="lookupId" type="text" placeholder="UUID уведомления">
          <button class="secondary" type="button" id="addIdBtn">Добавить ID</button>
          <button class="secondary" type="button" id="refreshBtn">Обновить</button>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Канал</th>
                <th>Получатель</th>
                <th>Статус</th>
                <th>Когда</th>
                <th>Попытки</th>
                <th>Сообщение</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="notificationsBody">
              <tr><td colspan="8" class="empty">Пока нет уведомлений в базе.</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </div>
  </main>

  <script>
    const storageKey = "delayed-notifier-ids";
    const form = document.querySelector("#notifyForm");
    const submitBtn = document.querySelector("#submitBtn");
    const formNotice = document.querySelector("#formNotice");
    const statusLine = document.querySelector("#statusLine");
    const body = document.querySelector("#notificationsBody");
    const lookupId = document.querySelector("#lookupId");

    function loadIds() {
      try {
        return JSON.parse(localStorage.getItem(storageKey) || "[]");
      } catch {
        return [];
      }
    }

    function saveIds(ids) {
      localStorage.setItem(storageKey, JSON.stringify([...new Set(ids)].slice(0, 100)));
    }

    function rememberId(id) {
      const ids = loadIds();
      saveIds([id, ...ids.filter((item) => item !== id)]);
    }

    function removeId(id) {
      saveIds(loadIds().filter((item) => item !== id));
    }

    function toLocalInputValue(date) {
      const offsetMs = date.getTimezoneOffset() * 60000;
      return new Date(date.getTime() - offsetMs).toISOString().slice(0, 16);
    }

    function setDelay(minutes) {
      const date = new Date(Date.now() + minutes * 60000);
      document.querySelector("#scheduledAt").value = toLocalInputValue(date);
    }

    function formatDate(value) {
      if (!value) return "-";
      return new Intl.DateTimeFormat("ru-RU", {
        dateStyle: "short",
        timeStyle: "medium"
      }).format(new Date(value));
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function setNotice(text, type = "") {
      formNotice.textContent = text;
      formNotice.className = `notice ${type}`.trim();
    }

    async function requestJSON(url, options = {}) {
      const response = await fetch(url, {
        headers: { "Content-Type": "application/json" },
        ...options
      });
      const text = await response.text();
      const data = text ? JSON.parse(text) : null;
      if (!response.ok) {
        throw new Error(data?.error || `HTTP ${response.status}`);
      }
      return data;
    }

    function renderRows(items) {
      if (items.length === 0) {
        body.innerHTML = '<tr><td colspan="8" class="empty">Пока нет уведомлений в базе.</td></tr>';
        return;
      }

      body.innerHTML = items.map((item) => {
        if (item.error) {
          return `
            <tr>
              <td class="mono">${escapeHtml(item.id)}</td>
              <td colspan="6" class="notice error">${escapeHtml(item.error)}</td>
              <td><button class="secondary" type="button" data-forget="${escapeHtml(item.id)}">Убрать</button></td>
            </tr>`;
        }

        return `
          <tr>
            <td class="mono">${escapeHtml(item.id)}</td>
            <td>${escapeHtml(item.channel)}</td>
            <td class="mono">${escapeHtml(item.recipient)}</td>
            <td><span class="badge ${escapeHtml(item.status)}">${escapeHtml(item.status)}</span></td>
            <td>${formatDate(item.scheduled_at)}</td>
            <td>${item.retry_count}/${item.max_retries}</td>
            <td class="message">${escapeHtml(item.message)}</td>
            <td>
              <button class="danger" type="button" data-cancel="${escapeHtml(item.id)}" ${item.status === "sent" || item.status === "failed" || item.status === "cancelled" ? "disabled" : ""}>Отменить</button>
            </td>
          </tr>`;
      }).join("");
    }

    async function refreshNotifications() {
      const dbItems = await requestJSON("/notify");
      const dbIds = new Set(dbItems.map((item) => item.id));
      const extraIds = loadIds().filter((id) => !dbIds.has(id));

      const extraItems = await Promise.all(extraIds.map(async (id) => {
        try {
          return await requestJSON(`/notify/${encodeURIComponent(id)}`);
        } catch (error) {
          return { id, error: error.message };
        }
      }));

      const items = [...dbItems, ...extraItems];
      renderRows(items);
      statusLine.textContent = `Из базы: ${dbItems.length}. Обновлено: ${new Intl.DateTimeFormat("ru-RU", { timeStyle: "medium" }).format(new Date())}`;
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      setNotice("");
      submitBtn.disabled = true;

      const scheduledAt = document.querySelector("#scheduledAt").value;
      const payload = {
        channel: document.querySelector("#channel").value,
        recipient: document.querySelector("#recipient").value.trim(),
        message: document.querySelector("#message").value.trim(),
        scheduled_at: new Date(scheduledAt).toISOString()
      };

      try {
        const created = await requestJSON("/notify", {
          method: "POST",
          body: JSON.stringify(payload)
        });
        rememberId(created.id);
        setNotice(`Создано: ${created.id}`, "ok");
        form.reset();
        setDelay(1);
        await refreshNotifications();
      } catch (error) {
        setNotice(error.message, "error");
      } finally {
        submitBtn.disabled = false;
      }
    });

    document.querySelectorAll("[data-delay]").forEach((button) => {
      button.addEventListener("click", () => setDelay(Number(button.dataset.delay)));
    });

    document.querySelector("#addIdBtn").addEventListener("click", async () => {
      const id = lookupId.value.trim();
      if (!id) return;
      rememberId(id);
      lookupId.value = "";
      await refreshNotifications();
    });

    document.querySelector("#refreshBtn").addEventListener("click", refreshNotifications);

    body.addEventListener("click", async (event) => {
      const cancelId = event.target.dataset.cancel;
      const forgetId = event.target.dataset.forget;

      if (forgetId) {
        removeId(forgetId);
        await refreshNotifications();
        return;
      }

      if (!cancelId) return;
      event.target.disabled = true;

      try {
        await requestJSON(`/notify/${encodeURIComponent(cancelId)}`, { method: "DELETE" });
        await refreshNotifications();
      } catch (error) {
        statusLine.textContent = error.message;
        event.target.disabled = false;
      }
    });

    setDelay(1);
    refreshNotifications();
    setInterval(refreshNotifications, 15000);
  </script>
</body>
</html>
